name: DevSecMLOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detector

jobs:

  # ── JOB 1 : Sécurité du code ──────────────────────────────
  security-scan:
    name: SAST & Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install bandit safety -r requirements.txt --quiet

      - name: SAST — Bandit (analyse statique)
        run: bandit -r src/ -ll -f json -o bandit-report.json
        continue-on-error: false

      - name: SCA — Safety (dépendances vulnérables)
        run: safety check -r requirements.txt

      - name: Upload rapport Bandit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # ── JOB 2 : Tests unitaires ───────────────────────────────
  tests:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Pull modèle depuis DagsHub (DVC)
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          pip install dvc[s3] --quiet
          dvc remote modify origin --local access_key_id $DAGSHUB_TOKEN
          dvc remote modify origin --local secret_access_key $DAGSHUB_TOKEN
          dvc pull artifacts/fraud_model.pkl

      - name: Install deps
        run: pip install -r requirements.txt pytest pytest-cov --quiet

      - name: Run tests with coverage
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-fail-under=70

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: coverage.xml

  # ── JOB 3 : Build + Scan + Push Docker ───────────────────
  docker-build-push:
    name: Docker Build · Trivy Scan · Push
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Pull modèle (DVC)
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          pip install dvc[s3] --quiet
          dvc remote modify origin --local access_key_id $DAGSHUB_TOKEN
          dvc remote modify origin --local secret_access_key $DAGSHUB_TOKEN
          dvc pull artifacts/fraud_model.pkl

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image Docker
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .
          docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:latest

      - name: Scan Trivy — CVE CRITICAL/HIGH
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push vers Docker Hub
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest

  # ── JOB 4 : Déploiement Render ───────────────────────────
  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "✓ Déploiement Render déclenché"

